<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播带货话术生成器</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

    <!-- Parsing Loading Modal -->
    <div id="parse-loading" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="spinner"></div>
            <p>正在解析商品信息...</p>
            <p class="modal-hint">请稍候</p>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <h1 class="hero-title">直播带货话术生成器</h1>
        <p class="hero-subtitle">输入用户评论，AI 智能生成爆款直播话术</p>
        <p class="hero-tip">只需输入商品链接或评论，AI 自动生成带货话术</p>
    </section>

    <!-- Main Container - Two Columns -->
    <main class="container">
        <div class="two-columns">
            <!-- Left Column: Input -->
            <div class="column left-column">
                <div class="card">
                    <div class="card-header">
                        <h2>输入信息</h2>
                    </div>

                    <p class="input-tip">👉 推荐：直接粘贴商品链接，一键生成完整话术</p>

                    <div class="form-group">
                        <label for="product-url">商品链接 <span class="optional">(可选)</span></label>
                        <input type="text" id="product-url" placeholder="粘贴抖音 / 淘宝 / 京东商品链接">
                    </div>

                    <div class="form-group">
                        <label for="comments">用户评论 <span class="optional">(可选)</span></label>
                        <textarea id="comments" placeholder="每行一条评论&#10;效果很好，就是有点贵&#10;用了一周变白了&#10;会回购"></textarea>
                    </div>

                    <button id="toggleAdvanced" class="toggle-btn">展开更多信息 ▼</button>

                    <div class="advanced-inputs" style="display: none;">
                        <div class="form-group">
                            <label for="product-name">商品名称</label>
                            <input type="text" id="product-name" placeholder="例如：美白精华液">
                        </div>

                        <div class="form-group">
                            <label for="product-info">商品描述</label>
                            <input type="text" id="product-info" placeholder="例如：主打美白提亮，28天见效">
                        </div>

                        <div class="form-group">
                            <label for="selling-points">产品卖点</label>
                            <input type="text" id="selling-points" placeholder="例如：防晒50+，不油腻，适合油皮">
                        </div>
                    </div>

                    <div class="example-btns">
                        <span class="example-label">使用示例：</span>
                        <button class="example-btn" onclick="loadExample(1)">美妆</button>
                        <button class="example-btn" onclick="loadExample(2)">数码</button>
                        <button class="example-btn" onclick="loadExample(3)">食品</button>
                        <button class="example-btn" onclick="loadExample(4)">服装</button>
                        <button class="example-btn secondary" onclick="generateTestComments()">✨ 自动补全信息</button>
                    </div>

                    <button id="generate-btn" class="btn-primary" onclick="generateScripts()">
                        生成脚本
                    </button>
                </div>
            </div>

            <!-- Right Column: Results -->
            <div class="column right-column">
                <div class="card result-card">
                    <div class="card-header">
                        <h2>生成结果</h2>
                        <p class="card-hint">AI 正在实时生成中...</p>
                    </div>

                    <!-- Empty State -->
                    <div id="empty-state" class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p>填写左侧信息，点击生成按钮</p>
                        <p class="empty-hint">AI 将为您生成直播话术</p>
                    </div>

                    <!-- Streaming State -->
                    <div id="streaming" class="streaming-container" style="display: none;">
                        <div id="streamingContent" class="streaming-content"></div>
                    </div>

                    <!-- Loading State (Backup) -->
                    <div id="loading" class="loading-state" style="display: none;">
                        <div class="progress-steps">
                            <div class="step" id="step-1">
                                <div class="step-icon">1</div>
                                <div class="step-content">
                                    <div class="step-title">分析评论</div>
                                    <div class="step-desc">提取用户痛点和需求</div>
                                </div>
                            </div>
                            <div class="step-line"></div>
                            <div class="step" id="step-2">
                                <div class="step-icon">2</div>
                                <div class="step-content">
                                    <div class="step-title">生成话术</div>
                                    <div class="step-desc">构建直播脚本框架</div>
                                </div>
                            </div>
                            <div class="step-line"></div>
                            <div class="step" id="step-3">
                                <div class="step-icon">3</div>
                                <div class="step-content">
                                    <div class="step-title">优化完善</div>
                                    <div class="step-desc">添加爆款元素</div>
                                </div>
                            </div>
                        </div>
                        <p class="loading-text">AI 正在工作中，请稍候...</p>
                    </div>

                    <!-- Error State -->
                    <div id="error" class="error" style="display: none;"></div>

                    <!-- Results Content -->
                    <div id="results-content" class="results-list" style="display: none;"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>Powered by AI</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
