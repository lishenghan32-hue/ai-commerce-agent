<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Commerce - 工作流模式</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
        }

        .header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #111;
        }

        .header .nav {
            display: flex;
            gap: 16px;
        }

        .header .nav a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .header .nav a:hover {
            color: #667eea;
        }

        .header .nav a.active {
            color: #667eea;
            font-weight: 500;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }

        .input-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-row input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .input-row input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-start {
            padding: 14px 28px;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-start:hover {
            opacity: 0.85;
        }

        .btn-start:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Messages Flow */
        .messages-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Message */
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-text {
            color: #333;
            font-size: 14px;
            line-height: 1.6;
            padding: 10px 14px;
            background: white;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .card-tag {
            padding: 4px 10px;
            background: #667eea;
            color: white;
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .card-content {
            font-size: 14px;
            line-height: 1.8;
            color: #444;
        }

        .card-content .label {
            color: #666;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .card-content .value {
            color: #333;
            margin-bottom: 12px;
        }

        /* Product Card */
        .product-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .product-info .item {
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .product-info .item .label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .product-info .item .value {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 0;
        }

        /* OCR Card */
        .ocr-text {
            padding: 14px;
            background: #f9f9f9;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.8;
            color: #333;
        }

        /* Structured Card - Editable */
        .structured-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .structured-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .structured-field label {
            font-size: 12px;
            font-weight: 500;
            color: #666;
        }

        .structured-field input {
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .structured-field input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-confirm {
            margin-top: 16px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-confirm:hover {
            background: #5a6fd6;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        /* Scripts Card */
        .script-section {
            margin-bottom: 16px;
        }

        .script-section:last-child {
            margin-bottom: 0;
        }

        .script-section-label {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .script-section-label::before {
            content: '';
            width: 3px;
            height: 12px;
            background: #667eea;
            border-radius: 2px;
        }

        .script-section-content {
            padding: 12px 14px;
            background: #f9f9f9;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.7;
            color: #333;
        }

        .script-section:last-child .script-section-content {
            background: #fff5f5;
            border-left: 3px solid #ff4757;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
        }

        .empty-hint {
            font-size: 14px;
            color: #bbb;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Commerce Agent</h1>
        <div class="nav">
            <a href="/">基础模式</a>
            <a href="/workflow" class="active">工作流模式</a>
        </div>
    </div>

    <div class="container">
        <!-- Input Section -->
        <div class="input-section">
            <div class="input-row">
                <input
                    type="text"
                    id="product-url"
                    placeholder="请输入商品链接（支持抖音、淘宝、京东等）"
                >
                <button id="start-btn" class="btn-start" onclick="runFlow()">开始执行</button>
            </div>
        </div>

        <!-- Messages Container -->
        <div id="messages-container" class="messages-container">
            <div class="empty-state">
                <div class="empty-icon">🔄</div>
                <p>输入商品链接开始执行工作流</p>
                <p class="empty-hint">系统将逐步解析商品信息，并在结构化步骤等待确认</p>
            </div>
        </div>
    </div>

    <script>
        // ===== State =====
        let messages = [];
        let flowData = {
            product: null,
            ocr: "",
            structured: {},
            scripts: null,
        };
        let resumeFn = null;  // Promise resolve function for pause

        // ===== Utilities =====
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ===== Message Functions =====
        function addMessage(text) {
            messages.push({ type: 'message', text });
            render();
        }

        function addCard(type, data) {
            messages.push({ type: 'card', cardType: type, data });
            render();
        }

        // ===== Pause Function =====
        function waitForUserConfirm() {
            return new Promise((resolve) => {
                resumeFn = resolve;
                // Re-render to show confirm button
                render();
            });
        }

        // ===== Mock APIs =====
        async function mockParse(url) {
            await sleep(1200);
            return {
                name: "夏季儿童纯棉短袖套装",
                price: "39.9",
                platform: "抖音",
                sales: "2.3万"
            };
        }

        async function mockOCR() {
            await sleep(1500);
            return "纯棉材质，透气吸汗，适合夏季穿着。100%纯棉面料，柔软舒适不起球。多个颜色可选，男童女童都适合。";
        }

        async function mockStructured() {
            await sleep(1000);
            return {
                title: "夏季儿童纯棉套装",
                material: "100%纯棉",
                function: "透气吸汗、柔软舒适",
                scene: "夏季日常、上学",
                target: "3-8岁儿童",
                advantage: "纯棉不起球，多色可选"
            };
        }

        async function mockScripts() {
            await sleep(2000);
            return {
                opening_hook: "家人们，这不快夏天了嘛，给孩子买衣服最愁人了",
                pain_point: "孩子皮肤嫩，普通面料穿一会儿就闷出汗",
                solution: "我给孩子换了这个纯棉套装，真的透气",
                proof: "邻居家小孩穿了一个夏天，洗了好几次还是软乎乎的",
                offer: "这波活动价39.9，比实体店便宜一半"
            };
        }

        // ===== Main Flow =====
        async function runFlow() {
            const urlInput = document.getElementById('product-url');
            const url = urlInput.value.trim();

            if (!url) {
                alert('请输入商品链接');
                return;
            }

            // Reset state
            messages = [];
            flowData = { product: null, ocr: "", structured: {}, scripts: null };
            resumeFn = null;

            // Disable button
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            btn.textContent = '执行中...';

            try {
                // Step 1: Parse Product
                addMessage('正在解析商品链接...');
                const product = await mockParse(url);
                flowData.product = product;
                addCard('product', product);
                addMessage('商品解析完成');

                // Step 2: OCR
                addMessage('正在识别商品图片内容（OCR）...');
                const ocr = await mockOCR();
                flowData.ocr = ocr;
                addCard('ocr', ocr);
                addMessage('OCR识别完成');

                // Step 3: Structured
                addMessage('正在提取结构化卖点信息...');
                const structured = await mockStructured();
                flowData.structured = structured;
                addCard('structured', structured);
                addMessage('结构化信息已生成，请确认');

                // === PAUSE HERE ===
                await waitForUserConfirm();

                // Step 4: Generate Scripts
                addMessage('正在根据结构化信息生成直播话术...');
                const scripts = await mockScripts();
                flowData.scripts = scripts;
                addCard('scripts', scripts);
                addMessage('话术生成完成！');

            } catch (error) {
                addMessage('执行出错: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '开始执行';
            }
        }

        // ===== Resume Flow =====
        function handleConfirm() {
            if (resumeFn) {
                resumeFn();
                resumeFn = null;
            }
        }

        // ===== Update Structured Field =====
        function updateStructuredField(key, value) {
            flowData.structured[key] = value;
            // Update the data in the last card
            const lastCard = messages.filter(m => m.type === 'card' && m.cardType === 'structured');
            if (lastCard.length > 0) {
                lastCard[lastCard.length - 1].data = flowData.structured;
            }
            render();
        }

        // ===== Render =====
        function render() {
            const container = document.getElementById('messages-container');

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔄</div>
                        <p>输入商品链接开始执行工作流</p>
                        <p class="empty-hint">系统将逐步解析商品信息，并在结构化步骤等待确认</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map((msg, index) => {
                if (msg.type === 'message') {
                    return `
                        <div class="message" style="animation-delay: ${index * 0.1}s">
                            <div class="message-icon">🤖</div>
                            <div class="message-content">
                                <div class="message-text">${msg.text}</div>
                            </div>
                        </div>
                    `;
                }

                if (msg.type === 'card') {
                    return renderCard(msg.cardType, msg.data, index);
                }

                return '';
            }).join('');

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function renderCard(type, data, index) {
            if (type === 'product') {
                return `
                    <div class="card" style="animation-delay: ${index * 0.1}s">
                        <div class="card-header">
                            <span class="card-tag">商品</span>
                            <span class="card-title">解析结果</span>
                        </div>
                        <div class="card-content">
                            <div class="product-info">
                                <div class="item">
                                    <div class="label">商品名称</div>
                                    <div class="value">${data.name}</div>
                                </div>
                                <div class="item">
                                    <div class="label">价格</div>
                                    <div class="value">¥${data.price}</div>
                                </div>
                                <div class="item">
                                    <div class="label">平台</div>
                                    <div class="value">${data.platform}</div>
                                </div>
                                <div class="item">
                                    <div class="label">销量</div>
                                    <div class="value">${data.sales}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (type === 'ocr') {
                return `
                    <div class="card" style="animation-delay: ${index * 0.1}s">
                        <div class="card-header">
                            <span class="card-tag">OCR</span>
                            <span class="card-title">图片文字识别</span>
                        </div>
                        <div class="card-content">
                            <div class="ocr-text">${data}</div>
                        </div>
                    </div>
                `;
            }

            if (type === 'structured') {
                const isPaused = resumeFn !== null;
                return `
                    <div class="card" style="animation-delay: ${index * 0.1}s">
                        <div class="card-header">
                            <span class="card-tag">结构化</span>
                            <span class="card-title">卖点信息提取</span>
                        </div>
                        <div class="card-content">
                            <div class="structured-grid">
                                <div class="structured-field">
                                    <label>商品标题</label>
                                    <input value="${data.title || ''}" onchange="updateStructuredField('title', this.value)">
                                </div>
                                <div class="structured-field">
                                    <label>材质</label>
                                    <input value="${data.material || ''}" onchange="updateStructuredField('material', this.value)">
                                </div>
                                <div class="structured-field">
                                    <label>功能</label>
                                    <input value="${data.function || ''}" onchange="updateStructuredField('function', this.value)">
                                </div>
                                <div class="structured-field">
                                    <label>使用场景</label>
                                    <input value="${data.scene || ''}" onchange="updateStructuredField('scene', this.value)">
                                </div>
                                <div class="structured-field">
                                    <label>目标人群</label>
                                    <input value="${data.target || ''}" onchange="updateStructuredField('target', this.value)">
                                </div>
                                <div class="structured-field">
                                    <label>核心优势</label>
                                    <input value="${data.advantage || ''}" onchange="updateStructuredField('advantage', this.value)">
                                </div>
                            </div>
                            ${isPaused ? `<button class="btn-confirm" onclick="handleConfirm()">确认并继续</button>` : ''}
                        </div>
                    </div>
                `;
            }

            if (type === 'scripts') {
                return `
                    <div class="card" style="animation-delay: ${index * 0.1}s">
                        <div class="card-header">
                            <span class="card-tag">话术</span>
                            <span class="card-title">直播带货话术</span>
                        </div>
                        <div class="card-content">
                            <div class="script-section">
                                <div class="script-section-label">开头吸引</div>
                                <div class="script-section-content">${data.opening_hook}</div>
                            </div>
                            <div class="script-section">
                                <div class="script-section-label">痛点描述</div>
                                <div class="script-section-content">${data.pain_point}</div>
                            </div>
                            <div class="script-section">
                                <div class="script-section-label">解决方案</div>
                                <div class="script-section-content">${data.solution}</div>
                            </div>
                            <div class="script-section">
                                <div class="script-section-label">证明案例</div>
                                <div class="script-section-content">${data.proof}</div>
                            </div>
                            <div class="script-section">
                                <div class="script-section-label">促单话术</div>
                                <div class="script-section-content">${data.offer}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            return '';
        }

        // Initial render
        render();
    </script>
</body>
</html>
