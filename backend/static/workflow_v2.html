<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Commerce - 工作流模式</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="/static/css/workflow_v2.css">
</head>
<body>
    <div id="root"></div>

    <!-- Load utility functions (no JSX, no Babel needed) -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>

    <script type="text/babel">
        // ===== React Components (use Utils and API from window) =====

        const { sleep, generateId, formatScriptData, getSectionLabel, createEmptyScript } = window.Utils;
        const { callParseAPI, callParseStreamAPI } = window.API;

        function LoadingBubble({ text }) {
            return (
                <div className="message-item-no-avatar">
                    <div className="line">
                        <span className="loading-text">
                            {text ? (
                                <span>
                                    {text.split('...')[0]}...
                                    <span className="loading-dots-inline">
                                        <span className="loading-dot"></span>
                                        <span className="loading-dot"></span>
                                        <span className="loading-dot"></span>
                                    </span>
                                </span>
                            ) : (
                                <span className="loading-dots-inline">
                                    <span className="loading-dot"></span>
                                    <span className="loading-dot"></span>
                                    <span className="loading-dot"></span>
                                </span>
                            )}
                        </span>
                    </div>
                </div>
            );
        }

        // 无边框文字消息组件
        function TextMessage({ status, children }) {
            return (
                <div className="message-item">
                    <span className="status-icon">{status}</span>
                    <span className="message-text">{children}</span>
                </div>
            );
        }

        // 多行文字消息（用于商品解析结果）
        function LinesMessage({ lines }) {
            return (
                <div className="message-item-no-avatar">
                    {lines.map((line, idx) => (
                        <div className="line" key={idx}>
                            <span className="status">{line.status}</span>
                            <span dangerouslySetInnerHTML={{ __html: line.text }} />
                        </div>
                    ))}
                </div>
            );
        }

        function ProductCard({ data }) {
            return (
                <div className="card">
                    <div className="card-header">
                        <span className="card-tag">商品</span>
                        <span className="card-title">解析结果</span>
                    </div>
                    <div className="product-grid">
                        <div className="product-item">
                            <div className="label">商品名称</div>
                            <div className="value">{data.name}</div>
                        </div>
                        <div className="product-item">
                            <div className="label">价格</div>
                            <div className="value">¥{data.price}</div>
                        </div>
                        <div className="product-item">
                            <div className="label">平台</div>
                            <div className="value">{data.platform}</div>
                        </div>
                        <div className="product-item">
                            <div className="label">销量</div>
                            <div className="value">{data.sales}</div>
                        </div>
                    </div>
                </div>
            );
        }

        function OCRItemCard({ data }) {
            return (
                <div className="card">
                    <div className="card-header">
                        <span className="card-tag">OCR</span>
                        <span className="card-title">图片 {data.index}</span>
                    </div>
                    <div className="ocr-text">
                        {data.status === 'loading' ? '识别中...' : data.text}
                    </div>
                </div>
            );
        }

        function OCRSummaryCard({ data }) {
            const isStructuredFormat = data.material !== undefined || data.features !== undefined;

            if (isStructuredFormat) {
                return (
                    <div className="card">
                        <div className="card-header">
                            <span className="card-tag">OCR</span>
                            <span className="card-title">AI 识别结果汇总</span>
                            <span className="ai-badge">
                                <span className="ai-icon">⚡</span> AI 分析
                            </span>
                        </div>
                        <div className="ocr-summary">
                            {data.product_name && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">🛍️ 商品名称</div>
                                    <div className="ocr-summary-text">{data.product_name}</div>
                                </div>
                            )}

                            {data.material && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">📦 材质</div>
                                    <div className="ocr-summary-text">{data.material}</div>
                                </div>
                            )}

                            {data.features && data.features.length > 0 && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">✨ 产品特点</div>
                                    <div className="ocr-summary-text">
                                        <div style={{display: 'flex', flexWrap: 'wrap', gap: '8px'}}>
                                            {data.features.map((feature, idx) => (
                                                <span key={idx} style={{
                                                    background: '#f0f0ff',
                                                    color: '#667eea',
                                                    padding: '4px 10px',
                                                    borderRadius: '12px',
                                                    fontSize: '13px'
                                                }}>
                                                    {feature}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {data.applicable && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">👥 适用人群/场景</div>
                                    <div className="ocr-summary-text">{data.applicable}</div>
                                </div>
                            )}

                            {data.colors && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">🎨 颜色</div>
                                    <div className="ocr-summary-text">{data.colors}</div>
                                </div>
                            )}

                            {data.season && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">🌡 适用季节</div>
                                    <div className="ocr-summary-text">{data.season}</div>
                                </div>
                            )}

                            {data.raw_summary && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">📋 详细汇总</div>
                                    <div className="ocr-summary-text" style={{whiteSpace: 'pre-wrap'}}>
                                        {data.raw_summary}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="card">
                    <div className="card-header">
                        <span className="card-tag">OCR</span>
                        <span className="card-title">识别结果汇总</span>
                    </div>
                    <div className="ocr-summary">
                        {data.items && data.items.map((item, idx) => (
                            <div key={idx} className="ocr-summary-item">
                                <div className="ocr-summary-header">图片 {item.index}</div>
                                <div className="ocr-summary-text">{item.text}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function StructuredCard({ data, onChange, onConfirm, showConfirm }) {
            const [editedFields, setEditedFields] = React.useState({});
            const [originalData, setOriginalData] = React.useState({...data});

            React.useEffect(() => {
                setOriginalData({...data});
                setEditedFields({});
            }, [data]);

            const handleFieldChange = (key, value) => {
                onChange(key, value);
                setEditedFields(prev => ({...prev, [key]: value !== originalData[key]}));
            };

            const handleReset = (key) => {
                onChange(key, originalData[key]);
                setEditedFields(prev => ({...prev, [key]: false}));
            };

            const fieldLabels = {
                title: '商品标题',
                material: '材质',
                function: '功能',
                scene: '使用场景',
                target: '目标人群',
                advantage: '核心优势'
            };

            return (
                <div className="card">
                    <div className="card-header">
                        <span className="card-tag">结构化</span>
                        <span className="card-title">商品信息提取</span>
                        <span className="ai-badge">
                            <span className="ai-icon">⚡</span> AI 推荐
                        </span>
                    </div>
                    <div className="structured-grid">
                        {Object.keys(data).map(key => (
                            <div className="structured-field" key={key}>
                                <label>
                                    {fieldLabels[key] || key}
                                    {editedFields[key] && (
                                        <button
                                            className="reset-btn"
                                            onClick={() => handleReset(key)}
                                            title="恢复AI推荐"
                                        >
                                            ↩
                                        </button>
                                    )}
                                </label>
                                <input
                                    value={data[key] || ''}
                                    onChange={(e) => handleFieldChange(key, e.target.value)}
                                    className={editedFields[key] ? 'edited' : ''}
                                />
                            </div>
                        ))}
                    </div>
                    {showConfirm && (
                        <button className="btn-confirm" onClick={onConfirm}>
                            确认并继续
                        </button>
                    )}
                </div>
            );
        }

        function ScriptsCard({ data }) {
            const sections = [
                { key: 'opening_hook', label: '开头吸引' },
                { key: 'pain_point', label: '痛点描述' },
                { key: 'solution', label: '解决方案' },
                { key: 'proof', label: '证明案例' },
                { key: 'offer', label: '促单话术' }
            ];

            return (
                <div className="card">
                    <div className="card-header">
                        <span className="card-tag">话术</span>
                        <span className="card-title">直播带货话术</span>
                    </div>
                    {sections.map(section => (
                        <div className="script-section" key={section.key}>
                            <div className="script-section-label">{section.label}</div>
                            <div className="script-section-content">{data[section.key]}</div>
                        </div>
                    ))}
                </div>
            );
        }

        function MessageBubble({ message }) {
            const isLoading = message.type === 'loading';

            if (isLoading) {
                return <LoadingBubble text={message.text} />;
            }

            // 无边框文字消息
            if (message.type === 'text') {
                return <TextMessage status={message.status}>{message.content}</TextMessage>;
            }

            // 多行消息（商品解析结果）
            if (message.type === 'lines') {
                return <LinesMessage lines={message.lines} />;
            }

            if (message.cardType === 'product') {
                return <ProductCard data={message.data} />;
            }

            if (message.cardType === 'ocr_item') {
                return <OCRItemCard data={message.data} />;
            }

            if (message.cardType === 'ocr_summary') {
                return <OCRSummaryCard data={message.data} />;
            }

            if (message.cardType === 'structured') {
                return (
                    <div className="message-item waiting">
                        <TextMessage status="🤔">请确认商品信息</TextMessage>
                        <StructuredCard
                            data={message.data}
                            onChange={message.onChange}
                            onConfirm={message.onConfirm}
                            showConfirm={message.showConfirm}
                        />
                    </div>
                );
            }

            if (message.cardType === 'scripts') {
                return <ScriptsCard data={message.data} />;
            }

            // 保留原有对话气泡（用户输入）
            const isUser = message.role === 'user';
            return (
                <div className={`message-wrapper ${isUser ? 'user' : ''}`}>
                    <div className="message-avatar ai">{isUser ? '👤' : '🤖'}</div>
                    <div className="message-content">
                        <div className="message-bubble">
                            {message.content}
                        </div>
                    </div>
                </div>
            );
        }

        // ===== Main App Component =====
        const { useState, useEffect, useRef } = React;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isWaitingUser, setIsWaitingUser] = useState(false);
            const [structuredData, setStructuredData] = useState({});
            const [currentStep, setCurrentStep] = useState(0);
            const [subStep, setSubStep] = useState('');
            const [completedSteps, setCompletedSteps] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const parsedProductRef = useRef(null);
            const abortControllerRef = useRef(null);
            const bottomRef = useRef(null);

            // Auto-scroll to bottom
            useEffect(() => {
                bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            // Add message
            const addMessage = (message) => {
                setMessages(prev => [...prev, { ...message, id: generateId() }]);
            };

            // Update last message
            const updateLastMessage = (updates) => {
                setMessages(prev => {
                    const newMessages = [...prev];
                    if (newMessages.length > 0) {
                        newMessages[newMessages.length - 1] = {
                            ...newMessages[newMessages.length - 1],
                            ...updates
                        };
                    }
                    return newMessages;
                });
            };

            // Handle structured field change
            const handleStructuredChange = (key, value) => {
                setStructuredData(prev => ({ ...prev, [key]: value }));
                setMessages(prev => {
                    const newMessages = [...prev];
                    const lastIdx = newMessages.length - 1;
                    if (lastIdx >= 0 && newMessages[lastIdx].cardType === 'structured') {
                        newMessages[lastIdx] = {
                            ...newMessages[lastIdx],
                            data: { ...newMessages[lastIdx].data, [key]: value }
                        };
                    }
                    return newMessages;
                });
            };

            // Continue to generate scripts after user confirms structured data
            const handleScriptsContinue = async () => {
                setIsWaitingUser(false);
                setCurrentStep(4);
                setSubStep('正在生成话术...');

                // 添加开始生成话术的消息
                addMessage({
                    type: 'text',
                    status: '✅',
                    content: '正在生成话术...',
                    role: 'ai'
                });

                const currentStructured = structuredData;
                const productData = parsedProductRef.current || {};

                try {
                    const query = new URLSearchParams({
                        product_url: '',
                        product_name: productData.name || '',
                        product_info: productData.selling_points || '',
                        selling_points: productData.selling_points || '',
                        structured: JSON.stringify(currentStructured),
                        comments: JSON.stringify(productData.comments || [])
                    });

                    const response = await fetch(`/api/generate-scripts-sse?${query}`, { method: 'GET' });

                    if (!response.ok) throw new Error('话术生成失败');

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    let script = createEmptyScript();
                    let currentField = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const text = decoder.decode(value);
                        const lines = text.split('\n');

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const dataStr = line.slice(6);
                                try {
                                    const data = JSON.parse(dataStr);

                                    // script_section event
                                    if (data.label && !data.content) {
                                        currentField = data.field;
                                        script[currentField] = [];
                                        setSubStep(`正在生成${data.label}...`);
                                    }

                                    // script_chunk event
                                    if (data.field && data.content) {
                                        currentField = data.field;
                                        if (!script[data.field]) {
                                            script[data.field] = [];
                                        }
                                        script[data.field].push(data.content);

                                        const formatted = formatScriptData(script);
                                        setSubStep(`正在生成${getSectionLabel(currentField)}...`);

                                        updateLastMessage({
                                            type: 'card',
                                            cardType: 'scripts',
                                            data: formatted,
                                            role: 'ai'
                                        });
                                    }

                                    // script_complete event
                                    if (data.scores !== undefined) {
                                        setSubStep('');
                                        setCompletedSteps(prev => [...prev, 4]);
                                    }

                                } catch (e) {
                                    // Not JSON, skip
                                }
                            }
                        }
                    }

                    if (Object.keys(script).length === 0) {
                        throw new Error('话术生成失败');
                    }

                    setCompletedSteps(prev => [...new Set([...prev, 4])]);
                    setSubStep('');

                    // 完成消息
                    addMessage({
                        type: 'text',
                        status: '✅',
                        content: '话术生成完成',
                        role: 'ai'
                    });

                    addMessage({
                        type: 'card',
                        cardType: 'scripts',
                        data: script,
                        role: 'ai'
                    });

                } catch (error) {
                    if (error.name === 'AbortError') return;
                    console.error('Scripts generation error:', error);
                    addMessage({ type: 'text', status: '❌', content: '话术生成出错: ' + error.message, role: 'ai' });
                }
            };

            // Main flow
            const runFlow = async () => {
                if (!input.trim()) return;

                const url = input.trim();
                setMessages([]);
                setIsWaitingUser(false);
                setStructuredData({});
                setCurrentStep(1);
                setCompletedSteps([]);
                setSubStep('');
                setIsGenerating(true);

                // Create abort controller
                abortControllerRef.current = new AbortController();

                // Disable input
                const btn = document.getElementById('start-btn');
                if (btn) btn.disabled = true;

                // Store parsed data for later use
                parsedProductRef.current = null;

                try {
                    // Step 1: Parse product
                    setSubStep('正在解析商品');
                    addMessage({ type: 'loading', text: '正在解析商品', role: 'ai' });

                    const result = await callParseAPI(url);
                    console.log('[商品解析结果]', result);
                    parsedProductRef.current = result;

                    setCompletedSteps(prev => [...prev, 1]);

                    // 解析完成 - 先更新 loading 为完成消息
                    updateLastMessage({
                        type: 'text',
                        status: '✅',
                        content: '完成商品解析',
                        role: 'ai'
                    });

                    addMessage({
                        type: 'lines',
                        lines: [
                            { status: '商品名称：', text: `<strong>${result.name}</strong>` },
                            { status: '平台：', text: '抖音' }
                        ]
                    });

                    // Step 2: Call streaming API for OCR, structure and scripts
                    setCurrentStep(2);
                    setSubStep('正在识别商品图片');
                    addMessage({ type: 'loading', content: '', role: 'ai' });

                    try {
                        const requestBody = {
                            name: result.name || '',
                            selling_points: result.selling_points || '',
                            images: result.images || [],
                            comments: result.comments || []
                        };

                        const response = await callParseStreamAPI(requestBody);

                        if (!response.ok) throw new Error('处理失败');

                        const reader = response.body.getReader();
                        const decoder = new TextDecoder();

                        let script = createEmptyScript();
                        let currentField = '';
                        let ocrTotal = 0;
                        let ocrTexts = [];
                        let lastOcrIndex = 0;

                        // Process streaming events
                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;

                            const text = decoder.decode(value);
                            const lines = text.split('\n');

                            for (const line of lines) {
                                if (line.startsWith('event:')) {
                                    continue;
                                }
                                if (line.startsWith('data: ')) {
                                    const dataStr = line.slice(6);
                                    console.log('[SSE] 原始数据:', dataStr);
                                    try {
                                        const data = JSON.parse(dataStr);
                                        console.log('[SSE] 解析后数据:', data);

                                        // ocr_start event - 开始识别图片（没有 index）
                                        if (data.total !== undefined && data.index === undefined && data.ocr_text === undefined) {
                                            setSubStep(`正在识别图片 1/${data.total}`);
                                            // 更新"正在识别商品图片"的 loading 为"正在识别第1张..."
                                            updateLastMessage({
                                                type: 'loading',
                                                text: '正在识别第 1 张图片',
                                                role: 'ai'
                                            });
                                        }

                                        // ocr_image event - 每张图片识别完成
                                        if (data.index !== undefined && data.total !== undefined && data.ocr_text !== undefined) {
                                            ocrTotal = data.total;
                                            lastOcrIndex = data.index;
                                            ocrTexts.push(data.ocr_text || '');
                                            setSubStep(`正在识别第 ${data.index}/${data.total} 张图片`);

                                            // 更新"正在识别第X张图片"的 loading 为结果
                                            updateLastMessage({
                                                type: 'text',
                                                status: '✅',
                                                content: `图片${data.index}：${data.ocr_text || '（未识别到文字）'}`,
                                                role: 'ai'
                                            });

                                            // 如果还有下一张图片，添加新的 loading 显示下一张状态
                                            if (data.index < data.total) {
                                                addMessage({
                                                    type: 'loading',
                                                    text: `正在识别第 ${data.index + 1} 张图片`,
                                                    role: 'ai'
                                                });
                                            }
                                        }

                                        // ocr_complete event - all images processed
                                        if (data.combined_text !== undefined) {
                                            setCompletedSteps(prev => [...new Set([...prev, 2])]);
                                            // 更新 OCR 开始的 loading 为完成消息
                                            updateLastMessage({
                                                type: 'text',
                                                status: '✅',
                                                content: `OCR识别完成，共 ${lastOcrIndex} 张图片`,
                                                role: 'ai'
                                            });
                                            // 添加 AI 汇总 loading
                                            addMessage({
                                                type: 'loading',
                                                text: '正在AI汇总',
                                                role: 'ai'
                                            });
                                        }

                                        // ocr_summary_complete event - AI 提取结构化信息
                                        if (data.features !== undefined) {
                                            setSubStep('AI 提取结构化信息');
                                            // 更新 loading 为 AI 汇总完成消息
                                            updateLastMessage({
                                                type: 'text',
                                                status: '✅',
                                                content: 'AI汇总完成',
                                                role: 'ai'
                                            });

                                            // 改为文字消息形式显示 OCR 汇总
                                            const lines = [];
                                            if (data.product_name) lines.push({ status: '商品名称：', text: data.product_name });
                                            if (data.material) lines.push({ status: '材质：', text: data.material });
                                            if (data.features && data.features.length > 0) {
                                                lines.push({ status: '特点：', text: data.features.join('、') });
                                            }
                                            if (data.applicable) lines.push({ status: '适用：', text: data.applicable });
                                            if (data.colors) lines.push({ status: '颜色：', text: data.colors });
                                            if (data.season) lines.push({ status: '季节：', text: data.season });
                                            if (data.raw_summary) lines.push({ status: '详细汇总：', text: data.raw_summary });

                                            if (lines.length > 0) {
                                                addMessage({ type: 'lines', lines, role: 'ai' });
                                            }

                                            // 添加结构化提取 loading
                                            addMessage({
                                                type: 'loading',
                                                text: '正在结构化提取信息...',
                                                role: 'ai'
                                            });
                                        }

                                        // structure_complete event
                                        if (data.title !== undefined) {
                                            setSubStep('提取结构化信息...');
                                            setCurrentStep(3);
                                            setCompletedSteps(prev => [...new Set([...prev, 2, 3])]);
                                            setStructuredData(data);

                                            // 更新 loading 为完成消息
                                            updateLastMessage({
                                                type: 'text',
                                                status: '✅',
                                                content: '结构化提取完成',
                                                role: 'ai'
                                            });

                                            addMessage({
                                                type: 'card',
                                                cardType: 'structured',
                                                data: data,
                                                role: 'ai',
                                                onChange: handleStructuredChange,
                                                onConfirm: handleScriptsContinue,
                                                showConfirm: true
                                            });

                                            // Pause and wait for user confirmation
                                            setIsWaitingUser(true);
                                            return;
                                        }

                                        // script_chunk event
                                        if (data.field && data.content) {
                                            currentField = data.field;
                                            if (!script[data.field]) {
                                                script[data.field] = [];
                                            }
                                            script[data.field].push(data.content);

                                            const formatted = formatScriptData(script);
                                            setSubStep(`正在生成${getSectionLabel(currentField)}...`);

                                            updateLastMessage({
                                                type: 'card',
                                                cardType: 'scripts',
                                                data: formatted,
                                                role: 'ai'
                                            });
                                        }

                                        // script_section event
                                        if (data.label && !data.content) {
                                            currentField = data.field;
                                            script[currentField] = [];
                                            setSubStep(`正在生成${data.label}...`);
                                        }

                                        // script_complete event
                                        if (data.scores !== undefined) {
                                            setSubStep('');
                                            setCompletedSteps(prev => [...prev, 4]);
                                        }

                                    } catch (e) {
                                        // Not JSON, skip
                                    }
                                }
                            }
                        }

                        if (Object.keys(script).length === 0) {
                            throw new Error('流式处理失败');
                        }

                        setSubStep('');
                        setCompletedSteps(prev => [...prev, 2, 3, 4]);

                        // 添加完成消息
                        addMessage({
                            type: 'text',
                            status: '✅',
                            content: '话术生成完成',
                            role: 'ai'
                        });

                        // Add final scripts card
                        addMessage({
                            type: 'card',
                            cardType: 'scripts',
                            data: script,
                            role: 'ai'
                        });

                    } catch (error) {
                        if (error.name === 'AbortError') {
                            return;
                        }
                        console.error('Stream error:', error);
                        addMessage({ type: 'text', status: '❌', content: '处理出错: ' + error.message, role: 'ai' });
                    }

                } catch (error) {
                    if (error.name === 'AbortError') {
                        return;
                    }
                    console.error('Flow error:', error);
                    addMessage({ type: 'text', status: '❌', content: '执行出错: ' + error.message, role: 'ai' });
                } finally {
                    if (btn) btn.disabled = false;
                    setIsGenerating(false);
                }
            };

            return (
                <div>
                    {/* Header */}
                    <header className="header">
                        <h1>AI Commerce Agent</h1>
                    </header>

                    {/* Main Content */}
                    <main className="main-container" style={{ paddingTop: currentStep > 0 ? '140px' : '80px' }}>
                        {messages.length === 0 ? (
                            <div className="initial-state">
                                <div className="initial-icon">🔄</div>
                                <div className="initial-title">AI Live Broadcast Script Generation Agent</div>
                                <div className="initial-hint">输入商品链接开始执行直播话术生成智能体</div>
                            </div>
                        ) : (
                            <div className="messages-container">
                                {messages.map((msg, idx) => (
                                    <MessageBubble key={msg.id || idx} message={msg} />
                                ))}
                                <div ref={bottomRef}></div>
                            </div>
                        )}
                    </main>

                    {/* Input Section */}
                    <div className="input-section-wrapper">
                        <div className="input-container">
                            <div className="input-row">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="请输入商品链接（支持抖音、淘宝、京东等）"
                                    onKeyPress={(e) => e.key === 'Enter' && runFlow()}
                                />
                                <button
                                    id="start-btn"
                                    className="btn-start"
                                    onClick={runFlow}
                                >
                                    开始生成
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
