<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Commerce - 工作流模式</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/css/workflow_v2.css">
</head>
<body>
    <div id="root"></div>

    <!-- Load utility functions (no JSX, no Babel needed) -->
    <script src="/static/js/utils.js?v=20260331-2"></script>
    <script src="/static/js/api.js?v=20260331-2"></script>

    <script type="text/babel">
        // ===== React Components (use Utils and API from window) =====

        const { sleep, generateId, formatScriptData, getSectionLabel, createEmptyScript } = window.Utils;
        const formatScriptMarkdown = window.Utils.formatScriptMarkdown || ((script) => {
            const labels = {
                opening_hook: '开头吸引',
                pain_point: '痛点描述',
                solution: '解决方案',
                proof: '证明案例',
                offer: '促单话术'
            };
            return Object.entries(labels)
                .map(([key, label]) => {
                    const rawContent = Array.isArray(script[key]) ? script[key].join('') : (script[key] || '');
                    const content = String(rawContent)
                        .replace(/\r\n?/g, '\n')
                        .replace(/\n{3,}/g, '\n\n')
                        .trim();
                    return content ? `## ${label}\n\n${content}` : '';
                })
                .filter(Boolean)
                .join('\n\n');
        });
        const { callParseAPI, callParseStreamAPI } = window.API;

        function LoadingBubble({ text }) {
            return (
                <div className="message-item-no-avatar">
                    <div className="line">
                        <span className="loading-bubble">
                            <span className="loading-label">
                                {text ? text.split('...')[0] + '...' : 'Loading'}
                            </span>
                            <span className="loading-dots">
                                <span className="loading-dot"></span>
                                <span className="loading-dot"></span>
                                <span className="loading-dot"></span>
                            </span>
                        </span>
                    </div>
                </div>
            );
        }

        // 无边框文字消息组件
        function TextMessage({ status, children }) {
            return (
                <div className="message-item">
                    <span className="status-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" fill="#111827"/>
                            <circle cx="12" cy="12" r="4" fill="white"/>
                        </svg>
                    </span>
                    <span className="message-text bold">{children}</span>
                </div>
            );
        }

        // 多行文字消息（用于商品解析结果）
        function LinesMessage({ lines }) {
            return (
                <div className="message-item-no-avatar">
                    {lines.map((line, idx) => (
                        <div className="line" key={idx}>
                            <span className="status">{line.status}</span>
                            <span dangerouslySetInnerHTML={{ __html: line.text }} />
                        </div>
                    ))}
                </div>
            );
        }

        function ProductCard({ data }) {
            return (
                <div className="card">
                    <div className="card-header">
                        <h3>Product</h3>
                    </div>
                    <div className="product-grid">
                        <div className="product-item">
                            <div className="label">商品名称</div>
                            <div className="value">{data.name}</div>
                        </div>
                        <div className="product-item">
                            <div className="label">价格</div>
                            <div className="value">¥{data.price}</div>
                        </div>
                        <div className="product-item">
                            <div className="label">平台</div>
                            <div className="value">{data.platform}</div>
                        </div>
                        <div className="product-item">
                            <div className="label">销量</div>
                            <div className="value">{data.sales}</div>
                        </div>
                    </div>
                </div>
            );
        }

        function OCRItemCard({ data }) {
            return (
                <div className="card">
                    <div className="card-header">
                        <h3>OCR</h3>
                    </div>
                    <div className="ocr-text">
                        {data.status === 'loading' ? '识别中...' : data.text}
                    </div>
                </div>
            );
        }

        function OCRSummaryCard({ data }) {
            const isStructuredFormat = data.material !== undefined || data.features !== undefined;

            if (isStructuredFormat) {
                return (
                    <div className="card">
                        <div className="card-header">
                            <h3>OCR Summary</h3>
                            <span className="ai-badge">AI Assist</span>
                        </div>
                        <div className="ocr-summary">
                            {data.product_name && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">🛍️ 商品名称</div>
                                    <div className="ocr-summary-text">{data.product_name}</div>
                                </div>
                            )}

                            {data.material && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">📦 材质</div>
                                    <div className="ocr-summary-text">{data.material}</div>
                                </div>
                            )}

                            {data.features && data.features.length > 0 && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">✨ 产品特点</div>
                                    <div className="ocr-summary-text">
                                        <div style={{display: 'flex', flexWrap: 'wrap', gap: '8px'}}>
                                            {data.features.map((feature, idx) => (
                                                <span key={idx} style={{
                                                    background: '#f0f0ff',
                                                    color: '#667eea',
                                                    padding: '4px 10px',
                                                    borderRadius: '12px',
                                                    fontSize: '13px'
                                                }}>
                                                    {feature}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {data.function && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">🎯 功能</div>
                                    <div className="ocr-summary-text">{data.function}</div>
                                </div>
                            )}

                            {data.scene && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">🌍 使用场景</div>
                                    <div className="ocr-summary-text">{data.scene}</div>
                                </div>
                            )}

                            {data.applicable && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">👥 适用人群/场景</div>
                                    <div className="ocr-summary-text">{data.applicable}</div>
                                </div>
                            )}

                            {data.colors && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">🎨 颜色</div>
                                    <div className="ocr-summary-text">{data.colors}</div>
                                </div>
                            )}

                            {data.season && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">🌡 适用季节</div>
                                    <div className="ocr-summary-text">{data.season}</div>
                                </div>
                            )}

                            {data.raw_summary && (
                                <div className="ocr-summary-item">
                                    <div className="ocr-summary-header">📋 详细汇总</div>
                                    <div className="ocr-summary-text" style={{whiteSpace: 'pre-wrap'}}>
                                        {data.raw_summary}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="card">
                    <div className="card-header">
                        <h3>OCR Summary</h3>
                    </div>
                    <div className="ocr-summary">
                        {data.items && data.items.map((item, idx) => (
                            <div key={idx} className="ocr-summary-item">
                                <div className="ocr-summary-header">图片 {item.index}</div>
                                <div className="ocr-summary-text">{item.text}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ===== Comments Section Component =====
        function CommentsSection({ comments, hasTriggered, onChange, onGenerate, onContinue, isGenerating }) {
            const [isCollapsed, setIsCollapsed] = React.useState(true);
            const hasComments = comments && comments.length > 0 && comments.some(c => c && c.trim());

            React.useEffect(() => {
                if (hasTriggered && hasComments) {
                    setIsCollapsed(false);
                }
            }, [hasTriggered, hasComments]);

            return (
                <div className="comments-section">
                    {hasTriggered && hasComments && (
                        <div className="comments-toggle">
                            <button
                                type="button"
                                className="toggle-btn"
                                onClick={() => setIsCollapsed(!isCollapsed)}
                            >
                                <span>💬 用户评论</span>
                                <span className="toggle-arrow">{isCollapsed ? '▼' : '▲'}</span>
                            </button>
                            <span className="comments-count">已生成 {comments.filter(c => c && c.trim()).length} 条评论</span>
                        </div>
                    )}

                    {hasTriggered && hasComments && !isCollapsed && (
                        <div className="comments-grid">
                            {comments.map((comment, idx) => (
                                <div key={idx} className="comment-item">
                                    <label>评论 {idx + 1}</label>
                                    <input
                                        type="text"
                                        value={comment}
                                        onChange={(e) => onChange(idx, e.target.value)}
                                        placeholder={`评论 ${idx + 1}...`}
                                    />
                                </div>
                            ))}
                        </div>
                    )}

                    <div className="comments-buttons">
                        {hasTriggered && (
                            <button
                                type="button"
                                className={`generate-comments-btn${hasComments ? ' generate-comments-btn-secondary' : ''}`}
                                onClick={onGenerate}
                                disabled={isGenerating}
                            >
                                {isGenerating ? (
                                    <span className="loading-text">
                                        AI 生成评论中
                                        <span className="loading-dots-inline">
                                            <span className="loading-dot"></span>
                                            <span className="loading-dot"></span>
                                            <span className="loading-dot"></span>
                                        </span>
                                    </span>
                                ) : (hasComments ? '重新生成评论' : '生成评论')}
                            </button>
                        )}

                        {hasTriggered && (
                            <button
                                type="button"
                                className="btn-confirm btn-continue"
                                onClick={onContinue}
                                disabled={isGenerating}
                            >
                                {isGenerating ? '处理中...' : (hasTriggered && hasComments ? '继续生成话术' : '跳过评论，直接生成话术')}
                            </button>
                        )}

                        {!hasTriggered && (
                            <button
                                type="button"
                                className="generate-comments-btn"
                                onClick={onGenerate}
                                disabled={isGenerating}
                            >
                                {isGenerating ? (
                                    <span className="loading-text">
                                        AI 生成评论中
                                        <span className="loading-dots-inline">
                                            <span className="loading-dot"></span>
                                            <span className="loading-dot"></span>
                                            <span className="loading-dot"></span>
                                        </span>
                                    </span>
                                ) : '触发用户评论生成'}
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function StructuredCard({ data, onChange, onConfirm, showConfirm, onGenerateComments, isGeneratingComments }) {
            const [editedFields, setEditedFields] = React.useState({});
            const [originalData, setOriginalData] = React.useState({...data});
            const [generatedComments, setGeneratedComments] = React.useState([]);
            const [hasTriggeredComments, setHasTriggeredComments] = React.useState(false);

            React.useEffect(() => {
                setOriginalData({...data});
                setEditedFields({});
                setGeneratedComments([]);
                setHasTriggeredComments(false);
            }, [data]);

            const handleFieldChange = (key, value) => {
                onChange(key, value);
                setEditedFields(prev => ({...prev, [key]: value !== originalData[key]}));
            };

            const handleReset = (key) => {
                onChange(key, originalData[key]);
                setEditedFields(prev => ({...prev, [key]: false}));
            };

            const handleCommentChange = (idx, value) => {
                const newComments = [...generatedComments];
                newComments[idx] = value;
                setGeneratedComments(newComments);
            };

            const handleGenerateComments = async () => {
                if (onGenerateComments) {
                    setHasTriggeredComments(true);
                    const comments = await onGenerateComments();
                    if (comments && Array.isArray(comments)) {
                        setGeneratedComments(comments.filter(comment => comment && comment.trim()).slice(0, 10));
                    }
                }
            };

            const handleContinue = () => {
                // Pass generated comments to onConfirm
                const validComments = generatedComments.filter(c => c && c.trim());
                if (onConfirm) {
                    onConfirm(hasTriggeredComments && validComments.length > 0 ? validComments : []);
                }
            };

            const fieldLabels = {
                title: '商品名称',
                material: '材质',
                features: '特点',
                function: '功能',
                scene: '使用场景',
                applicable: '适用',
                colors: '颜色',
                season: '季节',
                raw_summary: '详细汇总'
            };

            // Split fields into two columns: left column (first 5) and right column (remaining)
            const fieldEntries = Object.keys(data).filter(key => data[key] !== undefined && data[key] !== null);
            // Swap position of scene and raw_summary
            const sortedFields = [];
            const sceneIdx = fieldEntries.indexOf('scene');
            const rawSummaryIdx = fieldEntries.indexOf('raw_summary');
            if (sceneIdx !== -1 && rawSummaryIdx !== -1) {
                fieldEntries.forEach(key => {
                    if (key === 'scene') sortedFields.push('raw_summary');
                    else if (key === 'raw_summary') sortedFields.push('scene');
                    else sortedFields.push(key);
                });
            } else {
                sortedFields.push(...fieldEntries);
            }
            const half = Math.ceil(sortedFields.length / 2);
            const leftFields = sortedFields.slice(0, half);
            const rightFields = sortedFields.slice(half);

            return (
                <div className="card">
                    <div className="card-header">
                        <h3>Product Structure</h3>
                        <span className="ai-badge">AI Assist</span>
                    </div>

                    {/* Two-column grid layout */}
                    <div className="structured-grid-two-col">
                        {/* Left column */}
                        <div className="structured-col">
                            {leftFields.map(key => {
                                if (key === 'raw_summary') return null;
                                return (
                                <div className="structured-field" key={key}>
                                    <label>
                                        {fieldLabels[key] || key}
                                        {editedFields[key] && (
                                            <button
                                                className="reset-btn"
                                                onClick={() => handleReset(key)}
                                                title="恢复AI推荐"
                                            >
                                                ↩
                                            </button>
                                        )}
                                    </label>
                                    <input
                                        value={key === 'features' && Array.isArray(data[key]) ? data[key].join('、') : (data[key] || '')}
                                        onChange={(e) => handleFieldChange(key, e.target.value)}
                                        className={editedFields[key] ? 'edited' : ''}
                                    />
                                </div>
                                );
                            })}
                        </div>

                        {/* Right column */}
                        <div className="structured-col">
                            {rightFields.map(key => {
                                if (key === 'raw_summary') return null;
                                return (
                                <div className="structured-field" key={key}>
                                    <label>
                                        {fieldLabels[key] || key}
                                        {editedFields[key] && (
                                            <button
                                                className="reset-btn"
                                                onClick={() => handleReset(key)}
                                                title="恢复AI推荐"
                                            >
                                                ↩
                                            </button>
                                        )}
                                    </label>
                                    <input
                                        value={key === 'features' && Array.isArray(data[key]) ? data[key].join('、') : (data[key] || '')}
                                        onChange={(e) => handleFieldChange(key, e.target.value)}
                                        className={editedFields[key] ? 'edited' : ''}
                                    />
                                </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Raw Summary - Full Width */}
                    {data.raw_summary && (
                        <div className="raw-summary-container">
                            <div className="structured-field">
                                <label>
                                    {fieldLabels['raw_summary'] || '详细汇总'}
                                    {editedFields['raw_summary'] && (
                                        <button
                                            className="reset-btn"
                                            onClick={() => handleReset('raw_summary')}
                                            title="恢复AI推荐"
                                        >
                                            ↩
                                        </button>
                                    )}
                                </label>
                                <textarea
                                    value={data.raw_summary || ''}
                                    onChange={(e) => handleFieldChange('raw_summary', e.target.value)}
                                    className={editedFields['raw_summary'] ? 'edited' : ''}
                                    rows={4}
                                    placeholder="详细汇总..."
                                />
                            </div>
                        </div>
                    )}

                    {/* Comments section below the card */}
                    {showConfirm && (
                        <CommentsSection
                            comments={generatedComments}
                            hasTriggered={hasTriggeredComments}
                            onChange={handleCommentChange}
                            onGenerate={handleGenerateComments}
                            onContinue={handleContinue}
                            isGenerating={isGeneratingComments}
                        />
                    )}
                </div>
            );
        }

        function ScriptsCard({ data }) {
            const sections = [
                { key: 'opening_hook', label: '开头吸引' },
                { key: 'pain_point', label: '痛点描述' },
                { key: 'solution', label: '解决方案' },
                { key: 'proof', label: '证明案例' },
                { key: 'offer', label: '促单话术' }
            ];

            return (
                <div className="card">
                    <div className="card-header">
                        <h3>Live Script</h3>
                    </div>
                    {sections.map(section => (
                        <div className="script-section" key={section.key}>
                            <div className="script-section-label">{section.label}</div>
                            <div className="script-section-content" dangerouslySetInnerHTML={{ __html: marked.parse(data[section.key] || '') }} />
                        </div>
                    ))}
                </div>
            );
        }

        function MarkdownMessage({ content }) {
            return (
                <div className="message-item-no-avatar">
                    <div className="markdown-message" dangerouslySetInnerHTML={{ __html: marked.parse(content || '') }} />
                </div>
            );
        }

        function MessageBubble({ message, isGenerating }) {
            const isUser = message.role === 'user';
            const isLoading = message.type === 'loading';

            // 用户消息使用气泡样式
            if (isUser && message.type === 'text') {
                return (
                    <div className="message-wrapper user">
                        <div className="message-avatar user">U</div>
                        <div className="message-content">
                            <div className="message-bubble">
                                {message.content}
                            </div>
                        </div>
                    </div>
                );
            }

            if (isLoading) {
                return <LoadingBubble text={message.text} />;
            }

            // 无边框文字消息 (带状态图标)
            if (message.type === 'text') {
                return (
                    <div className="message-wrapper">
                        <div className="message-content">
                            <div className="message-bubble">
                                {message.status && (
                                    <span className="inline-status-icon">
                                        {message.status === '✅' ? (
                                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                                <path d="M2.5 7L5.5 10.5L11.5 4.5" stroke="#111827" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                            </svg>
                                        ) : message.status === '⏹' ? (
                                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                                <rect x="3" y="3" width="8" height="8" rx="1" stroke="#111827" strokeWidth="2"/>
                                            </svg>
                                        ) : null}
                                    </span>
                                )}
                                {message.content}
                            </div>
                        </div>
                    </div>
                );
            }

            // 多行消息（商品解析结果）
            if (message.type === 'lines') {
                return <LinesMessage lines={message.lines} />;
            }

            if (message.type === 'markdown') {
                return <MarkdownMessage content={message.content} />;
            }

            if (message.cardType === 'product') {
                return <ProductCard data={message.data} />;
            }

            if (message.cardType === 'ocr_item') {
                return <OCRItemCard data={message.data} />;
            }

            if (message.cardType === 'ocr_summary') {
                return <OCRSummaryCard data={message.data} />;
            }

            if (message.cardType === 'structured') {
                return (
                    <div className="message-item-no-avatar">
                        {message.isWaiting && (
                            <TextMessage status="🤔">请确认商品信息</TextMessage>
                        )}
                        <StructuredCard
                            data={message.data}
                            onChange={message.onChange}
                            onConfirm={message.onConfirm}
                            showConfirm={message.showConfirm}
                            onGenerateComments={message.onGenerateComments}
                            isGeneratingComments={isGenerating}
                        />
                    </div>
                );
            }

            if (message.cardType === 'scripts') {
                return <ScriptsCard data={message.data} />;
            }

            // 保留原有对话气泡（用户输入）
            return (
                <div className={`message-wrapper ${isUser ? 'user' : ''}`}>
                    <div className="message-avatar ai">{isUser ? '👤' : '🤖'}</div>
                    <div className="message-content">
                        <div className="message-bubble">
                            {message.content}
                        </div>
                    </div>
                </div>
            );
        }

        // ===== Main App Component =====
        const { useState, useEffect, useRef } = React;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isWaitingUser, setIsWaitingUser] = useState(false);
            const [structuredData, setStructuredData] = useState({});
            const [currentStep, setCurrentStep] = useState(0);
            const [subStep, setSubStep] = useState('');
            const [completedSteps, setCompletedSteps] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [parseElapsedSeconds, setParseElapsedSeconds] = useState(0);
            const parsedProductRef = useRef(null);
            const abortControllerRef = useRef(null);
            const bottomRef = useRef(null);

            // Auto-scroll to bottom - only scroll after completion or when content changes significantly
            useEffect(() => {
                // Don't auto-scroll during parsing (currentStep === 1 and not completed)
                if (currentStep === 1 && !completedSteps.includes(1)) {
                    return; // Wait for parsing to complete
                }
                bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, currentStep, completedSteps]);

            // Parse timer - Step 1 only
            useEffect(() => {
                if (currentStep !== 1 || completedSteps.includes(1)) {
                    setParseElapsedSeconds(0);
                    return;
                }

                setParseElapsedSeconds(0);
                const timer = setInterval(() => {
                    setParseElapsedSeconds(prev => prev + 1);
                }, 1000);

                return () => clearInterval(timer);
            }, [currentStep, completedSteps]);

            // Update loading message with timer
            useEffect(() => {
                if (currentStep !== 1 || completedSteps.includes(1)) {
                    return;
                }

                setMessages(prev => {
                    if (prev.length === 0) return prev;
                    const next = [...prev];
                    const lastIndex = next.length - 1;
                    const lastMessage = next[lastIndex];
                    if (!lastMessage || lastMessage.type !== 'loading') return prev;

                    const nextText = parseElapsedSeconds > 0
                        ? `正在解析商品（${parseElapsedSeconds}秒）`
                        : '正在解析商品';

                    if (lastMessage.text === nextText) return prev;
                    next[lastIndex] = { ...lastMessage, text: nextText };
                    return next;
                });
            }, [parseElapsedSeconds, currentStep, completedSteps]);

            // Add message
            const addMessage = (message) => {
                setMessages(prev => [...prev, { ...message, id: generateId() }]);
            };

            // Update last message
            const updateLastMessage = (updates) => {
                setMessages(prev => {
                    const newMessages = [...prev];
                    if (newMessages.length > 0) {
                        newMessages[newMessages.length - 1] = {
                            ...newMessages[newMessages.length - 1],
                            ...updates
                        };
                    }
                    return newMessages;
                });
            };

            // Handle structured field change
            const handleStructuredChange = (key, value) => {
                setStructuredData(prev => ({ ...prev, [key]: value }));
                setMessages(prev => {
                    const newMessages = [...prev];
                    const lastIdx = newMessages.length - 1;
                    if (lastIdx >= 0 && newMessages[lastIdx].cardType === 'structured') {
                        newMessages[lastIdx] = {
                            ...newMessages[lastIdx],
                            data: { ...newMessages[lastIdx].data, [key]: value }
                        };
                    }
                    return newMessages;
                });
            };

            // Generate comments using AI
            const handleAppGenerateComments = async () => {
                const productData = parsedProductRef.current || {};
                const productName = productData.name || structuredData.title || '';
                const productInfo = productData.selling_points || structuredData.raw_summary || '';

                setIsGenerating(true);

                try {
                    const callGenerateCommentsAPI = window.API && window.API.callGenerateCommentsAPI
                        ? window.API.callGenerateCommentsAPI
                        : async (name, info) => {
                            const response = await fetch('/api/generate-comments', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    product_name: name || '',
                                    product_info: info || ''
                                })
                            });
                            if (!response.ok) {
                                let detail = '';
                                try {
                                    const errorData = await response.json();
                                    detail = errorData.detail || JSON.stringify(errorData);
                                } catch (parseError) {
                                    detail = await response.text();
                                }
                                throw new Error(detail || `Generate comments failed (${response.status})`);
                            }
                            return response.json();
                        };

                    const result = await callGenerateCommentsAPI(productName, productInfo);
                    return result.comments || [];
                } catch (error) {
                    console.error('Generate comments error:', error);
                    addMessage({
                        type: 'text',
                        status: '❌',
                        content: `评论生成失败: ${error.message || '请重试'}`,
                        role: 'ai'
                    });
                    return [];
                } finally {
                    setIsGenerating(false);
                }
            };

            // Continue to generate scripts after user confirms structured data
            const handleScriptsContinue = async (comments) => {
                setIsWaitingUser(false);
                setCurrentStep(4);
                setSubStep('正在生成话术...');

                // 添加开始生成话术的消息
                addMessage({
                    type: 'text',
                    status: '✅',
                    content: '正在生成话术...',
                    role: 'ai'
                });

                const currentStructured = structuredData;
                const productData = parsedProductRef.current || {};

                try {
                    const query = new URLSearchParams({
                        product_url: '',
                        product_name: productData.name || '',
                        product_info: productData.selling_points || '',
                        selling_points: productData.selling_points || '',
                        structured: JSON.stringify(currentStructured),
                        comments: JSON.stringify(comments || productData.comments || [])
                    });

                    const response = await fetch(`/api/generate-scripts-sse?${query}`, { method: 'GET' });

                    if (!response.ok) throw new Error('话术生成失败');

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    let script = createEmptyScript();
                    let currentField = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const text = decoder.decode(value);
                        const lines = text.split('\n');

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const dataStr = line.slice(6);
                                try {
                                    const data = JSON.parse(dataStr);

                                    // script_section event
                                    if (data.label && !data.content) {
                                        currentField = data.field;
                                        script[currentField] = [];
                                        setSubStep(`正在生成${data.label}...`);
                                    }

                                    // script_chunk event
                                    if (data.field && data.content) {
                                        currentField = data.field;
                                        if (!script[data.field]) {
                                            script[data.field] = [];
                                        }
                                        script[data.field].push(data.content);

                                        const markdown = formatScriptMarkdown(script);
                                        setSubStep(`正在生成${getSectionLabel(currentField)}...`);

                                        updateLastMessage({
                                            type: 'markdown',
                                            content: markdown,
                                            role: 'ai'
                                        });
                                    }

                                    // script_complete event
                                    if (data.completed !== undefined) {
                                        setSubStep('');
                                        setCompletedSteps(prev => [...prev, 4]);
                                    }

                                } catch (e) {
                                    console.error('Script stream parse/render error:', e, dataStr);
                                }
                            }
                        }
                    }

                    if (Object.keys(script).length === 0) {
                        throw new Error('话术生成失败');
                    }

                    setCompletedSteps(prev => [...new Set([...prev, 4])]);
                    setSubStep('');

                    // 完成消息
                    addMessage({
                        type: 'text',
                        status: '✅',
                        content: '话术生成完成',
                        role: 'ai'
                    });

                } catch (error) {
                    if (error.name === 'AbortError') return;
                    console.error('Scripts generation error:', error);
                    addMessage({ type: 'text', status: '❌', content: '话术生成出错: ' + error.message, role: 'ai' });
                }
            };

            // Main flow
            const runFlow = async () => {
                if (!input.trim()) return;

                const url = input.trim();
                setMessages([]);
                setIsWaitingUser(false);
                setStructuredData({});
                setCurrentStep(1);
                setCompletedSteps([]);
                setSubStep('');
                setIsGenerating(true);

                // Add user message with URL
                addMessage({ type: 'text', content: url, role: 'user' });

                // Clear input
                setInput('');

                // Create abort controller
                abortControllerRef.current = new AbortController();

                // Disable input
                const btn = document.getElementById('start-btn');
                if (btn) btn.disabled = true;

                // Store parsed data for later use
                parsedProductRef.current = null;

                try {
                    // Step 1: Parse product
                    setSubStep('正在解析商品');
                    addMessage({ type: 'loading', text: '正在解析商品', role: 'ai' });

                    const result = await callParseAPI(url, { signal: abortControllerRef.current?.signal });
                    console.log('[商品解析结果]', result);
                    parsedProductRef.current = result;

                    setCompletedSteps(prev => [...prev, 1]);

                    // 解析完成 - 先更新 loading 为完成消息
                    updateLastMessage({
                        type: 'text',
                        status: '✅',
                        content: '完成商品解析',
                        role: 'ai'
                    });

                    addMessage({
                        type: 'lines',
                        lines: [
                            { status: '商品名称：', text: `<strong>${result.name}</strong>` },
                            { status: '平台：', text: '抖音' }
                        ]
                    });

                    // Step 2: Call streaming API for OCR, structure and scripts
                    setCurrentStep(2);
                    setSubStep('正在识别商品图片');
                    addMessage({ type: 'loading', content: '', role: 'ai' });

                    try {
                        const requestBody = {
                            name: result.name || '',
                            selling_points: result.selling_points || '',
                            images: result.images || [],
                            comments: result.comments || []
                        };

                        const response = await callParseStreamAPI(requestBody, { signal: abortControllerRef.current?.signal });

                        if (!response.ok) throw new Error('处理失败');

                        const reader = response.body.getReader();
                        const decoder = new TextDecoder();

                        let script = createEmptyScript();
                        let currentField = '';
                        let ocrTotal = 0;
                        let ocrTexts = [];
                        let lastOcrIndex = 0;

                        // Process streaming events
                        while (true) {
                            // Check for abort
                            if (abortControllerRef.current?.signal?.aborted) {
                                reader.cancel();
                                throw new Error('AbortError');
                            }

                            const { done, value } = await reader.read();
                            if (done) break;

                            const text = decoder.decode(value);
                            const lines = text.split('\n');

                            for (const line of lines) {
                                if (line.startsWith('event:')) {
                                    continue;
                                }
                                if (line.startsWith('data: ')) {
                                    const dataStr = line.slice(6);
                                    console.log('[SSE] 原始数据:', dataStr);
                                    try {
                                        const data = JSON.parse(dataStr);
                                        console.log('[SSE] 解析后数据:', data);

                                        // ocr_start event - 开始识别图片（没有 index）
                                        if (data.total !== undefined && data.index === undefined && data.ocr_text === undefined) {
                                            setSubStep(`正在识别图片 1/${data.total}`);
                                            // 更新"正在识别商品图片"的 loading 为"正在识别第1张..."
                                            updateLastMessage({
                                                type: 'loading',
                                                text: '正在识别第 1 张图片',
                                                role: 'ai'
                                            });
                                        }

                                        // ocr_image event - 每张图片识别完成
                                        if (data.index !== undefined && data.total !== undefined && data.ocr_text !== undefined) {
                                            ocrTotal = data.total;
                                            lastOcrIndex = data.index;
                                            ocrTexts.push(data.ocr_text || '');
                                            setSubStep(`正在识别第 ${data.index}/${data.total} 张图片`);

                                            // 更新"正在识别第X张图片"的 loading 为结果
                                            updateLastMessage({
                                                type: 'text',
                                                status: '✅',
                                                content: `图片${data.index}：${data.ocr_text || '（未识别到文字）'}`,
                                                role: 'ai'
                                            });

                                            // 如果还有下一张图片，添加新的 loading 显示下一张状态
                                            if (data.index < data.total) {
                                                addMessage({
                                                    type: 'loading',
                                                    text: `正在识别第 ${data.index + 1} 张图片`,
                                                    role: 'ai'
                                                });
                                            }
                                        }

                                        // ocr_complete event - all images processed
                                        if (data.combined_text !== undefined) {
                                            setCompletedSteps(prev => [...new Set([...prev, 2])]);
                                            setSubStep('图片识别完成');  // 更新顶部状态
                                            // 更新 OCR 开始的 loading 为完成消息
                                            updateLastMessage({
                                                type: 'text',
                                                status: '✅',
                                                content: `OCR识别完成，共 ${lastOcrIndex} 张图片`,
                                                role: 'ai'
                                            });
                                            // 添加 AI 汇总 loading
                                            addMessage({
                                                type: 'loading',
                                                text: '正在AI汇总',
                                                role: 'ai'
                                            });
                                        }

                                        // ocr_summary_complete event - AI 提取结构化信息
                                        if (data.features !== undefined) {
                                            setSubStep('AI 提取结构化信息');
                                            // 更新 loading 为 AI 汇总完成消息
                                            updateLastMessage({
                                                type: 'text',
                                                status: '✅',
                                                content: 'AI汇总完成',
                                                role: 'ai'
                                            });

                                            // 改为文字消息形式显示 OCR 汇总
                                            const lines = [];
                                            if (data.product_name) lines.push({ status: '商品名称：', text: data.product_name });
                                            if (data.material) lines.push({ status: '材质：', text: data.material });
                                            if (data.features && data.features.length > 0) {
                                                lines.push({ status: '特点：', text: data.features.join('、') });
                                            }
                                            if (data.function) lines.push({ status: '功能：', text: data.function });
                                            if (data.scene) lines.push({ status: '使用场景：', text: data.scene });
                                            if (data.applicable) lines.push({ status: '适用：', text: data.applicable });
                                            if (data.colors) lines.push({ status: '颜色：', text: data.colors });
                                            if (data.season) lines.push({ status: '季节：', text: data.season });
                                            if (data.raw_summary) lines.push({ status: '详细汇总：', text: data.raw_summary });

                                            if (lines.length > 0) {
                                                addMessage({ type: 'lines', lines, role: 'ai' });
                                            }

                                            // 直接显示结构化卡片（不再需要 loading）
                                            addMessage({
                                                type: 'card',
                                                cardType: 'structured',
                                                data: {
                                                    title: data.product_name || '',
                                                    material: data.material || '',
                                                    features: data.features || [],
                                                    function: data.function || '',
                                                    scene: data.scene || '',
                                                    applicable: data.applicable || '',
                                                    colors: data.colors || '',
                                                    season: data.season || '',
                                                    raw_summary: data.raw_summary || ''
                                                },
                                                role: 'ai',
                                                onChange: handleStructuredChange,
                                                onConfirm: handleScriptsContinue,
                                                showConfirm: true,
                                                onGenerateComments: handleAppGenerateComments,
                                                isGeneratingComments: isGenerating,
                                                isWaiting: true
                                            });

                                            // Pause and wait for user confirmation
                                            setIsWaitingUser(true);
                                            return;
                                        }

                                        // structure_complete event
                                        if (data.title !== undefined) {
                                            setSubStep('提取结构化信息...');
                                            setCurrentStep(3);
                                            setCompletedSteps(prev => [...new Set([...prev, 2, 3])]);
                                            setStructuredData(data);

                                            // 更新 loading 为完成消息
                                            updateLastMessage({
                                                type: 'text',
                                                status: '✅',
                                                content: '结构化提取完成',
                                                role: 'ai'
                                            });

                                            addMessage({
                                                type: 'card',
                                                cardType: 'structured',
                                                data: data,
                                                role: 'ai',
                                                onChange: handleStructuredChange,
                                                onConfirm: handleScriptsContinue,
                                                showConfirm: true,
                                                onGenerateComments: handleAppGenerateComments,
                                                isGeneratingComments: isGenerating,
                                                isWaiting: true
                                            });

                                            // Pause and wait for user confirmation
                                            setIsWaitingUser(true);
                                            return;
                                        }

                                        // script_chunk event
                                        if (data.field && data.content) {
                                            currentField = data.field;
                                            if (!script[data.field]) {
                                                script[data.field] = [];
                                            }
                                            script[data.field].push(data.content);

                                            const markdown = formatScriptMarkdown(script);
                                            setSubStep(`正在生成${getSectionLabel(currentField)}...`);

                                            updateLastMessage({
                                                type: 'markdown',
                                                content: markdown,
                                                role: 'ai'
                                            });
                                        }

                                        // script_section event
                                        if (data.label && !data.content) {
                                            currentField = data.field;
                                            script[currentField] = [];
                                            setSubStep(`正在生成${data.label}...`);
                                        }

                                        // script_complete event
                                        if (data.completed !== undefined) {
                                            setSubStep('');
                                            setCompletedSteps(prev => [...prev, 4]);
                                        }

                                    } catch (e) {
                                        console.error('Flow stream parse/render error:', e, dataStr);
                                    }
                                }
                            }
                        }

                        if (Object.keys(script).length === 0) {
                            throw new Error('流式处理失败');
                        }

                        setSubStep('');
                        setCompletedSteps(prev => [...prev, 2, 3, 4]);

                        // 添加完成消息
                        addMessage({
                            type: 'text',
                            status: '✅',
                            content: '话术生成完成',
                            role: 'ai'
                        });

                    } catch (error) {
                        if (error.name === 'AbortError') {
                            return;
                        }
                        console.error('Stream error:', error);
                        addMessage({ type: 'text', status: '❌', content: '处理出错: ' + error.message, role: 'ai' });
                    }

                } catch (error) {
                    if (error.name === 'AbortError') {
                        return;
                    }
                    console.error('Flow error:', error);
                    addMessage({ type: 'text', status: '❌', content: '执行出错: ' + error.message, role: 'ai' });
                } finally {
                    if (btn) btn.disabled = false;
                    setIsGenerating(false);
                }
            };

            return (
                <div>
                    {/* Header */}
                    <header className="header">
                        <div className="header-inner">
                            <div className="brand">
                                <div className="mark">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                                <div className="brand-copy">
                                    <h1>AI Commerce Agent</h1>
                                    <p>script generation</p>
                                </div>
                            </div>
                            <div className="header-right">
                                <div className="eyebrow">Workflow</div>
                                <div className="workflow-status">
                                    Script generation in progress
                                </div>
                            </div>
                        </div>
                        {currentStep > 0 && (
                            <div className="header-inner progress">
                                <div className="current-state-label">Current state
                                    <span className="current-state">
                                        {subStep || (currentStep === 1 ? 'Parsing product' :
                                            currentStep === 2 ? 'Running OCR' :
                                            currentStep === 3 ? 'Building structure' :
                                            currentStep === 4 ? 'Generating script' : 'Waiting')}
                                    </span>
                                </div>
                                <div className="progress-steps">
                                    <span className={completedSteps.includes(1) ? 'progress-step done' : (currentStep === 1 ? 'progress-step active' : 'progress-step')}>
                                        Parse
                                    </span>
                                    <span className="progress-connector"></span>
                                    <span className={completedSteps.includes(2) ? 'progress-step done' : (currentStep === 2 ? 'progress-step active' : 'progress-step')}>
                                        OCR
                                    </span>
                                    <span className="progress-connector"></span>
                                    <span className={completedSteps.includes(3) ? 'progress-step done' : (currentStep === 3 ? 'progress-step active' : 'progress-step')}>
                                        Structure
                                    </span>
                                    <span className="progress-connector"></span>
                                    <span className={completedSteps.includes(4) ? 'progress-step done' : (currentStep === 4 ? 'progress-step active' : 'progress-step')}>
                                        Script
                                    </span>
                                </div>
                            </div>
                        )}
                    </header>

                    {/* Main Content */}
                    <main className="main-container">
                        {messages.length === 0 ? (
                            <div className="initial-state">
                                <div className="initial-icon">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                                <div className="initial-title">AI Live Broadcast Script Generation Agent</div>
                                <div className="initial-hint">顶栏采用极简悬浮，进度区采用时间轴式，让流程感更轻更高级。</div>
                            </div>
                        ) : (
                            <div className="messages-container">
                                {messages.map((msg, idx) => (
                                    <MessageBubble key={msg.id || idx} message={msg} isGenerating={isGenerating} />
                                ))}
                                <div ref={bottomRef}></div>
                            </div>
                        )}
                    </main>

                    {/* Input Section */}
                    <div className="input-section-wrapper">
                        <div className="input-container">
                            <div className="input-row">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="Paste a product link from Douyin, Taobao, JD..."
                                    onKeyPress={(e) => e.key === 'Enter' && runFlow()}
                                />
                                {isGenerating && (
                                    <button
                                        className="btn-stop"
                                        onClick={() => {
                                            if (abortControllerRef.current) {
                                                abortControllerRef.current.abort();
                                                addMessage({ type: 'text', status: '⏹️', content: '用户中止执行', role: 'ai' });
                                            }
                                        }}
                                    >
                                        Stop
                                    </button>
                                )}
                                <button
                                    id="start-btn"
                                    className="btn-start"
                                    onClick={runFlow}
                                    disabled={!input.trim() || isGenerating}
                                >
                                    {isGenerating ? 'Running...' : 'Start'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
